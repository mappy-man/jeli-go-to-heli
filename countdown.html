<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF - 8">
  <meta name="viewport" content="width=device-width, initial - scale=1.0">
  <title>days until</title>
</head>
<script src="script.js" defer></script>
<div class="countdown">
 <div class="counter__box">
   <p class="counter__time" id="days">00</p>
   <span class="counter__duration">Days</span>
 </div>
 <div class="counter__box">
   <p class="counter__time" id="hours">00</p>
   <span class="counter__duration">Hours</span>
 </div>
 <div class="counter__box">
   <p class="counter__time" id="minutes">00</p>
   <span class="counter__duration">Minutes</span>
 </div>
 <div class="counter__box">
   <p class="counter__time" id="seconds">00</p>
   <span class="counter__duration">Seconds</span>
 </div>
</div>


</html>
